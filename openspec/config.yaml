schema: spec-driven

# 项目上下文 — 生成所有 artifact 时注入到 AI 指令中
context: |
  mini-OpenClaw 是一个轻量级 AI Agent 对话系统。

  技术栈:
  - 后端: Python 3.13 + FastAPI + LangChain 1.2 + LangGraph 1.1 + DashScope Qwen LLM
  - 前端: Next.js 14 + TypeScript + React
  - RAG: LlamaIndex + DashScope/OpenAI Embeddings
  - 通信: SSE 流式传输

  项目结构:
  - backend/ — FastAPI 后端 (app.py 入口)
  - backend/graph/ — Agent 核心 (agent.py, prompt_builder.py, session_manager.py)
  - backend/tools/ — 工具集 (terminal, python_repl, fetch_url, read_file, write_file, search_knowledge, mem0, skills_scanner, create_skill_version)
  - backend/skills/ — 技能库 (6 个技能: dialogue-summarizer, get_date, get_weather, skill-benchmark, skill-creator, skill-creator-pro)
  - backend/workspace/ — Agent 人设 Markdown (SOUL.md, IDENTITY.md, USER.md, AGENTS.md)
  - backend/api/ — REST 路由 (chat, sessions, files, compress, config, tokens, eval, skills)
  - frontend/ — Next.js 前端

  关键设计模式:
  - Markdown-as-config: 人设/技能/记忆均为可读的 Markdown 文件
  - 6 层系统提示: 动态拼接 workspace 文件 + 技能快照
  - 双记忆模式: MEMORY.md 文件注入 vs RAG 向量检索（LlamaIndex）
  - SSE 事件流: 流式返回 token/tool_start/tool_end/rag_hit 等事件
  - 技能自动发现: 放置 SKILL.md 到 skills/<name>/ 即可自动注册
  - LLM 灵活切换: 通过 ChatOpenAI 适配器支持 DashScope/DeepSeek/OpenAI

  语言要求: 全程使用中文（回复、注释、文档、commit message），标识符保持英文。

# 按 artifact 类型定制的规则
rules:
  proposal:
    - 必须使用中文撰写
    - Impact 部分必须标注受影响的具体文件路径
    - 新增 Capabilities 使用 kebab-case 命名
  specs:
    - 必须使用中文撰写
    - 每个 Requirement 必须包含至少一个 Scenario
    - Scenario 必须使用 #### 四级标题（不能用三级或列表）
    - 使用 SHALL/MUST 表达规范性需求，避免 should/may
    - 修改已有 Requirement 时必须包含完整内容，不能只写变更部分
  design:
    - 必须使用中文撰写
    - Decisions 部分必须说明为什么选 X 而不是 Y
    - 涉及多个模块时必须包含数据流图或调用关系
    - 如果有迁移风险，必须包含回滚策略
  tasks:
    - 必须使用中文撰写
    - 每个任务不超过 2 小时工作量
    - 任务编号格式: X.Y（如 1.1, 1.2, 2.1）
    - 按依赖关系排序，先完成前置任务
    - 后端任务必须注明涉及的具体 Python 模块路径
    - 前端任务必须注明涉及的具体 React 组件路径
